<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ERP RESPIMAS - Prototipo Funcional | Validación de Requerimientos</title>
    <!-- Tailwind CSS + Font Awesome + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f3f4f6; }
        .modal-transition { transition: opacity 0.2s ease; }
        .table-sortable th { cursor: pointer; user-select: none; }
        .table-sortable th:hover { background-color: #e5e7eb; }
        .card-hover { transition: all 0.2s; }
        .card-hover:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .badge { @apply px-2 py-1 text-xs font-semibold rounded-full; }
        /* Estilo para simular filtros tipo Excel */
        .filter-input { @apply border border-gray-300 rounded-md px-2 py-1 text-sm w-full; }
    </style>
</head>
<body class="antialiased">

    <!-- Barra superior / Rol Simulado (RNF-04) -->
    <div class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-chalkboard-user text-indigo-600 text-2xl"></i>
                    <span class="font-bold text-xl text-gray-800">RESPIMAS · Sistema Integrado</span>
                    <span class="bg-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded-full ml-2">Prototipo validación</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-gray-100 px-3 py-1 rounded-full">
                        <i class="fas fa-user-shield text-gray-600"></i>
                        <span class="text-sm font-medium">Rol: <span class="text-indigo-700">Administración</span></span>
                    </div>
                    <div class="text-xs text-gray-400 hidden sm:block">RF-12 / RNF-04 · Control de acceso simulado</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Navegación principal (tabs) -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
        <div class="border-b border-gray-200">
            <nav class="-mb-px flex flex-wrap gap-2" id="tab-nav">
                <button data-tab="catalog" class="tab-btn active-tab px-4 py-2 text-sm font-medium rounded-t-lg border-b-2 border-indigo-600 text-indigo-600">📦 Catálogo & Inventario</button>
                <button data-tab="sales" class="tab-btn px-4 py-2 text-sm font-medium rounded-t-lg text-gray-500 hover:text-gray-700 border-b-2 border-transparent">💰 Ventas y Cuentas por Cobrar</button>
                <button data-tab="payables" class="tab-btn px-4 py-2 text-sm font-medium rounded-t-lg text-gray-500 hover:text-gray-700 border-b-2 border-transparent">🧾 Cuentas por Pagar</button>
                <button data-tab="quotes" class="tab-btn px-4 py-2 text-sm font-medium rounded-t-lg text-gray-500 hover:text-gray-700 border-b-2 border-transparent">📄 Cotizaciones / Órdenes</button>
                <button data-tab="reports" class="tab-btn px-4 py-2 text-sm font-medium rounded-t-lg text-gray-500 hover:text-gray-700 border-b-2 border-transparent">📊 Reportes y Trazabilidad</button>
            </nav>
        </div>
    </div>

    <!-- Contenedor de contenido dinámico -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6" id="app-content">
        <!-- Los diferentes tabs se cargan via JS dinámico -->
        <div id="dynamic-view"></div>
    </div>

    <!-- Modales globales (para edición, importar) -->
    <div id="global-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden transition-all">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto" id="modal-content"></div>
    </div>

    <script>
        // ----------------------------- BASE DE DATOS SIMULADA (cumple RF-01, RF-07, etc) -------------------------
        let products = [
            { id: "p1", sku: "INH-100", description: "Circuito anestesia adulto", marca: "RESPIMED", satCode: "43211503", priceClient: 450.00, priceSupplier: 320.00, stockMin: 20, currentStock: 45 },
            { id: "p2", sku: "INH-205", description: "Máscara inhaloterapia pediátrica", marca: "AEROHEALTH", satCode: "43211601", priceClient: 125.50, priceSupplier: 85.00, stockMin: 30, currentStock: 112 },
            { id: "p3", sku: "INH-309", description: "Nebulizador de malla", marca: "MEDMIST", satCode: "43211904", priceClient: 890.00, priceSupplier: 625.00, stockMin: 10, currentStock: 18 },
        ];

        let clients = [
            { id: "c1", rfc: "BIRJ850312HDF", businessName: "Hospital General del Norte", contact: "Dr. López", status: "activo" },
            { id: "c2", rfc: "HEMS970101KLA", businessName: "Farmacias Salud Total", contact: "Sra. Martínez", status: "activo" },
        ];

        let suppliers = [
            { id: "s1", rfc: "FAR800101ABC", name: "FARMACUR S.A. de C.V.", paymentTerms: "30 días", contact: "Ventas" },
            { id: "s2", rfc: "AME900202XYZ", name: "AMEHOS Internacional", paymentTerms: "15 días", contact: "Carlos" },
        ];

        // Facturas de venta (con items para afectar inventario) RF-03 + RF-04
        let salesInvoices = [
            { id: "inv1", folio: "F-001", date: "2026-03-01", dueDate: "2026-03-31", clientId: "c1", total: 450.00, status: "Pendiente", balance: 450.00, items: [{ productId: "p1", quantity: 1, price: 450.00 }] },
            { id: "inv2", folio: "F-002", date: "2026-03-15", dueDate: "2026-04-14", clientId: "c2", total: 1255.00, status: "Pendiente", balance: 1255.00, items: [{ productId: "p2", quantity: 10, price: 125.50 }] },
        ];
        let payments = []; // { id, invoiceId, amount, date, reference }

        // Cuentas por pagar (facturas proveedor)
        let supplierInvoices = [
            { id: "sp1", folio: "CP-101", date: "2026-02-20", dueDate: "2026-03-22", supplierId: "s1", total: 3200.00, status: "Pendiente", balance: 3200.00, items: [{ productId: "p1", quantity: 10, unitPrice: 320.00 }] },
            { id: "sp2", folio: "CP-205", date: "2026-03-05", dueDate: "2026-04-04", supplierId: "s2", total: 1700.00, status: "Pendiente", balance: 1700.00, items: [{ productId: "p2", quantity: 20, unitPrice: 85.00 }] },
        ];
        let supplierPayments = [];

        // Movimientos de inventario para trazabilidad RF-02
        let inventoryMovements = [
            { id: "mov1", date: "2026-03-01", type: "SALIDA", productId: "p1", quantity: 1, reference: "Venta F-001", user: "cobranzas" },
            { id: "mov2", date: "2026-03-15", type: "SALIDA", productId: "p2", quantity: 10, reference: "Venta F-002", user: "cobranzas" },
        ];

        let quotes = []; // RF-06 cotizaciones
        let purchaseOrders = [];

        // Helper: actualizar stock en base a movimientos
        function recalcStock() {
            // reiniciar stock a valores base (usaremos stock base simulado desde productos, pero los movimientos ya están)
            // Para consistencia, cada vez que se modifica venta o compra se actualiza, manejamos funciones específicas
        }
        function updateInventoryFromSale(invoice) {
            for(let item of invoice.items) {
                const prod = products.find(p => p.id === item.productId);
                if(prod) {
                    prod.currentStock -= item.quantity;
                    inventoryMovements.unshift({
                        id: Date.now() + Math.random(), date: new Date().toISOString().slice(0,10), type: "SALIDA",
                        productId: prod.id, quantity: item.quantity, reference: `Venta ${invoice.folio}`, user: "admin"
                    });
                }
            }
        }
        function updateInventoryFromPurchase(suppInv) {
            for(let item of suppInv.items) {
                const prod = products.find(p => p.id === item.productId);
                if(prod) {
                    prod.currentStock += item.quantity;
                    inventoryMovements.unshift({
                        id: Date.now() + Math.random(), date: new Date().toISOString().slice(0,10), type: "ENTRADA",
                        productId: prod.id, quantity: item.quantity, reference: `Compra ${suppInv.folio}`, user: "compras"
                    });
                }
            }
        }

        // Inicializar stock actual según movimientos históricos (simulación)
        function syncStockFromMovements() {
            // Recalcular desde base teórica (para demo, usamos los valores iniciales correctos, ya aplicamos)
            // las ventas ya se reflejaron en productos currentStock igual que lo definido.
            // Ajuste para que los movimientos de ejemplo coincidan
            const p1 = products.find(p=>p.sku==="INH-100"); if(p1) p1.currentStock = 45 - 1; // ya descontado
            const p2 = products.find(p=>p.sku==="INH-205"); if(p2) p2.currentStock = 112 - 10;
        }
        syncStockFromMovements();

        // ---------- Funciones de validación RF-07: SKU único, RFC único, folio factura único
        function isSkuUnique(sku, excludeId = null) { return !products.some(p => p.sku === sku && p.id !== excludeId); }
        function isRfcUnique(rfc, excludeId = null, type='client') { 
            if(type === 'client') return !clients.some(c => c.rfc === rfc && c.id !== excludeId);
            return !suppliers.some(s => s.rfc === rfc && s.id !== excludeId);
        }
        function isInvoiceFolioUnique(folio, excludeId = null) { return !salesInvoices.some(i => i.folio === folio && i.id !== excludeId); }

        // ---------- Renderizado modular (tabs) -------------
        const viewContainer = document.getElementById('dynamic-view');
        let activeTab = 'catalog';

        // Funciones render de cada vista
        function renderCatalogInventory() {
            return `
            <div class="space-y-6">
                <div class="bg-white p-5 rounded-xl shadow-sm border">
                    <div class="flex justify-between items-center flex-wrap gap-2 mb-4">
                        <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-boxes text-indigo-500 mr-2"></i>Catálogo de Productos (RF-01)</h2>
                        <button onclick="showProductModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700"><i class="fas fa-plus mr-1"></i>Nuevo producto</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full table-auto text-sm border" id="product-table">
                            <thead class="bg-gray-50"><tr><th class="px-4 py-2">SKU</th><th>Descripción</th><th>Marca</th><th>Precio Cliente</th><th>Stock actual</th><th>Stock Mínimo</th><th>Acciones</th></tr></thead>
                            <tbody>${products.map(p => `<tr><td class="px-4 py-2 font-mono">${p.sku}</td><td>${p.description}</td><td>${p.marca}</td><td>$${p.priceClient.toFixed(2)}</td><td class="font-semibold ${p.currentStock <= p.stockMin ? 'text-red-600' : ''}">${p.currentStock}</td><td>${p.stockMin}</td><td><button onclick="editProduct('${p.id}')" class="text-blue-500 mr-2"><i class="fas fa-edit"></i></button><button onclick="deleteProduct('${p.id}')" class="text-red-500"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border">
                    <h2 class="text-xl font-bold mb-3"><i class="fas fa-exchange-alt text-green-600 mr-2"></i>Movimientos de inventario (RF-02 / Trazabilidad)</h2>
                    <div class="overflow-x-auto"><table class="min-w-full text-sm"><thead class="bg-gray-100"><tr><th>Fecha</th><th>Tipo</th><th>Producto</th><th>Cantidad</th><th>Referencia</th><th>Usuario</th></tr></thead>
                    <tbody>${inventoryMovements.slice(0,15).map(m => {
                        const prod = products.find(p=>p.id===m.productId);
                        return `<tr><td>${m.date}</td><td class="${m.type === 'SALIDA' ? 'text-red-600' : 'text-green-600'} font-medium">${m.type}</td><td>${prod?.sku || '-'}</td><td>${m.quantity}</td><td>${m.reference}</td><td>${m.user}</td></tr>`;
                    }).join('')}</tbody></table></div>
                    <p class="text-xs text-gray-400 mt-2">* Movimientos automáticos al registrar ventas/recibir compras.</p>
                </div>
            </div>`;
        }

        function renderSalesReceivables() {
            const agingDays = (dueDate) => { const today = new Date(); const due = new Date(dueDate); const diff = Math.floor((today - due) / (1000*60*60*24)); return diff > 0 ? diff : 0; };
            return `
            <div class="space-y-6">
                <div class="bg-white p-5 rounded-xl shadow-sm">
                    <div class="flex justify-between flex-wrap gap-2 mb-3">
                        <h2 class="text-xl font-bold"><i class="fas fa-file-invoice-dollar text-blue-600"></i> Facturas de venta (RF-03)</h2>
                        <div><button onclick="showImportInvoiceModal()" class="bg-emerald-600 text-white px-3 py-1.5 rounded-md text-sm mr-2"><i class="fas fa-upload"></i> Importar CSV/XML</button>
                        <button onclick="showManualInvoiceModal()" class="bg-indigo-500 text-white px-3 py-1.5 rounded-md text-sm"><i class="fas fa-plus"></i> Factura manual</button></div>
                    </div>
                    <div class="overflow-x-auto"><table class="min-w-full text-sm border"><thead class="bg-gray-50"><tr><th>Folio</th><th>Fecha</th><th>Cliente</th><th>Total</th><th>Saldo</th><th>Días vencido</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>
                    ${salesInvoices.map(inv => {
                        const client = clients.find(c=>c.id===inv.clientId);
                        const aging = agingDays(inv.dueDate);
                        return `<tr><td>${inv.folio}</td><td>${inv.date}</td><td>${client?.businessName || 'N/A'}</td><td>$${inv.total.toFixed(2)}</td><td class="font-bold">$${inv.balance.toFixed(2)}</td><td class="${aging>30?'text-red-600':''}">${aging} días</td><td><span class="px-2 py-1 rounded-full text-xs ${inv.status==='Pagada'?'bg-green-100 text-green-700':'bg-yellow-100 text-yellow-700'}">${inv.status}</span></td>
                        <td><button onclick="registerPayment('${inv.id}')" class="text-indigo-600 text-xs"><i class="fas fa-money-bill-wave"></i> Abono</button></td></tr>`;
                    }).join('')}
                    </tbody></table></div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm"><h3 class="font-bold"><i class="fas fa-chart-line"></i> Cartera por cliente (RF-04 antigüedad)</h3><div id="aging-summary" class="mt-2 text-sm"></div></div>
            </div>`;
        }

        function renderPayables() {
            return `
            <div class="bg-white p-5 rounded-xl shadow-sm">
                <div class="flex justify-between"><h2 class="text-xl font-bold"><i class="fas fa-hand-holding-usd"></i> Cuentas por pagar a proveedores (RF-05)</h2><button onclick="showSupplierInvoiceModal()" class="bg-indigo-600 text-white px-3 py-1 rounded text-sm">+ Registrar factura compra</button></div>
                <div class="overflow-x-auto mt-4"><table class="min-w-full text-sm"><thead class="bg-gray-100"><tr><th>Folio Proveedor</th><th>Proveedor</th><th>Fecha Vencimiento</th><th>Total</th><th>Saldo Pendiente</th><th>Estado</th><th>Acción</th></tr></thead><tbody>
                ${supplierInvoices.map(sp => {
                    const supp = suppliers.find(s=>s.id===sp.supplierId);
                    return `<tr><td>${sp.folio}</td><td>${supp?.name||''}</td><td>${sp.dueDate}</td><td>$${sp.total.toFixed(2)}</td><td>$${sp.balance.toFixed(2)}</td><td>${sp.status}</td>
                    <td><button onclick="registerSupplierPayment('${sp.id}')" class="text-green-600 text-sm"><i class="fas fa-receipt"></i> Registrar pago</button></td></tr>`;
                }).join('')}
                </tbody></table></div>
            </div>`;
        }

        function renderQuotesOrders() {
            return `
            <div class="bg-white p-5 rounded-xl shadow-sm">
                <div class="flex justify-between"><h2 class="text-xl font-bold"><i class="fas fa-file-signature"></i> Cotizaciones y Órdenes de Compra (RF-06)</h2><button onclick="showNewQuoteModal()" class="bg-indigo-600 text-white px-3 py-1 rounded text-sm"><i class="fas fa-plus"></i> Nueva cotización</button></div>
                <div class="mt-4"><p class="text-gray-500">Simulación: las cotizaciones seleccionan productos del catálogo y generan PDF simbólico. Las órdenes de compra al recibir aumentan inventario.</p>
                <div class="border rounded p-3 mt-2"><h3 class="font-semibold">Cotizaciones recientes</h3><div id="quotes-list">${quotes.length ? quotes.map(q=>`<div class="border-b py-1">📄 Cotización ${q.id} - Cliente: ${q.clientName} - Total $${q.total}</div>`).join('') : '<p class="text-gray-400">Sin cotizaciones aún. Cree una para validar flujo.</p>'}</div></div>
                <button onclick="simulatePurchaseOrder()" class="mt-4 bg-blue-100 text-blue-800 px-4 py-2 rounded text-sm">➕ Simular Orden de Compra (incrementa inventario)</button>
            </div>`;
        }

        function renderReports() {
            const totalInventoryValue = products.reduce((acc,p)=> acc + (p.currentStock * p.priceClient),0);
            const agingCartera = () => { let totalVencida = 0; salesInvoices.forEach(i=>{ if(i.balance>0 && new Date(i.dueDate) < new Date()) totalVencida+=i.balance; }); return totalVencida; };
            return `
            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-white p-5 rounded-xl shadow-sm"><h3 class="font-bold text-lg"><i class="fas fa-chart-pie"></i> Reporte Inventario (RF-10)</h3><table class="w-full text-sm"><tr class="bg-gray-100"><th>SKU</th><th>Existencia</th><th>Stock Mínimo</th><th>Estatus</th></tr>${products.map(p=>`<tr><td>${p.sku}</td><td>${p.currentStock}</td><td>${p.stockMin}</td><td class="${p.currentStock <= p.stockMin ? 'text-red-500 font-bold' : 'text-green-600'}">${p.currentStock <= p.stockMin ? '⚠️ Bajo stock' : 'Normal'}</td></tr>`).join('')}</table><button onclick="exportReportCSV()" class="mt-3 text-indigo-600 text-sm"><i class="fas fa-download"></i> Exportar a Excel/CSV</button></div>
                <div class="bg-white p-5 rounded-xl shadow-sm"><h3 class="font-bold text-lg"><i class="fas fa-clock"></i> Antigüedad de Cartera</h3><p>Saldo vencido total: $${agingCartera().toFixed(2)}</p><p>Valor inventario: $${totalInventoryValue.toFixed(2)}</p><button class="mt-2 bg-gray-200 px-3 py-1 rounded text-sm" onclick="alert('Reporte PDF simulado: Cumple criterio de aceptación RF-10')">Exportar a PDF</button></div>
                <div class="bg-white p-5 rounded-xl shadow-sm col-span-2"><h3 class="font-bold">Historial completo de movimientos (RF-02 / trazabilidad)</h3><div class="overflow-y-auto max-h-60">${inventoryMovements.map(m=>`<div class="border-b py-1 text-xs">${m.date} - ${m.type} - Cant:${m.quantity} - Ref:${m.reference}</div>`).join('')}</div></div>
            </div>`;
        }

        function updateView() {
            if (activeTab === 'catalog') viewContainer.innerHTML = renderCatalogInventory();
            else if (activeTab === 'sales') viewContainer.innerHTML = renderSalesReceivables();
            else if (activeTab === 'payables') viewContainer.innerHTML = renderPayables();
            else if (activeTab === 'quotes') viewContainer.innerHTML = renderQuotesOrders();
            else if (activeTab === 'reports') viewContainer.innerHTML = renderReports();
            attachGlobalFunctionality();
        }

        window.showProductModal = () => { showModal(`<h3>Agregar/Editar Producto (validación SKU único)</h3><input id="sku" placeholder="SKU" class="border p-2 w-full my-2"><input id="desc" placeholder="Descripción" class="border p-2 w-full my-2"><input id="priceC" placeholder="Precio Cliente" type="number" class="border p-2 w-full"><button onclick="saveProduct()" class="bg-indigo-600 text-white px-4 py-2 rounded mt-2">Guardar</button>`); };
        window.editProduct = (id) => { const p = products.find(p=>p.id===id); showModal(`<h3>Editar producto</h3><input id="sku" value="${p.sku}"><input id="desc" value="${p.description}"><button onclick="updateProduct('${id}')">Actualizar</button>`); };
        window.saveProduct = () => { const sku = document.getElementById('sku').value; if(!isSkuUnique(sku)){ alert("SKU ya existe (RF-07)"); return; } products.push({id:Date.now().toString(), sku, description:document.getElementById('desc').value, marca:"GEN", priceClient:parseFloat(document.getElementById('priceC').value), currentStock:0, stockMin:5}); closeModal(); updateView(); };
        window.deleteProduct = (id) => { products = products.filter(p=>p.id !== id); updateView(); };
        window.registerPayment = (invoiceId) => { const inv = salesInvoices.find(i=>i.id===invoiceId); const monto = prompt(`Abono para factura ${inv.folio} (Saldo: $${inv.balance})`, "100"); if(monto && !isNaN(monto)){ let amount = parseFloat(monto); if(amount>inv.balance) alert("Monto supera saldo"); else { inv.balance -= amount; if(inv.balance<=0.001) inv.status="Pagada"; payments.push({id:Date.now(), invoiceId, amount, date:new Date().toISOString().slice(0,10), reference:"Banco"}); updateView(); alert("Abono registrado, saldo actualizado automáticamente."); } } };
        window.registerSupplierPayment = (spId) => { const inv = supplierInvoices.find(i=>i.id===spId); const amount = prompt(`Pago a proveedor, saldo: ${inv.balance}`); if(amount){ inv.balance-=parseFloat(amount); if(inv.balance<=0) inv.status="Pagada"; updateView(); } };
        window.showImportInvoiceModal = () => { showModal(`<h3>Importar facturas CSV (RF-03)</h3><p class="text-xs">Formato: folio,fecha,cliente_rfc,producto_sku,cantidad,total</p><input type="file" id="csvFile" accept=".csv"><button onclick="processCSVImport()" class="bg-green-600 text-white p-2 mt-2">Importar y descontar inventario</button>`); };
        window.processCSVImport = () => { alert("Simulación: Se importaría factura, se validaría folio único (RF-07) y se descontaría stock. Cumple RF-02"); closeModal(); };
        window.showManualInvoiceModal = () => { showModal(`<h3>Nueva factura (afecta inventario)</h3><select id="productSelect">${products.map(p=>`<option value="${p.id}">${p.sku} - stock ${p.currentStock}</option>`).join('')}</select><input placeholder="Cantidad" id="qty" type="number"><input placeholder="Folio único" id="folio"><button onclick="createManualInvoice()" class="bg-indigo-600 p-2 text-white">Crear</button>`); };
        window.createManualInvoice = () => { const folio = document.getElementById('folio').value; if(!isInvoiceFolioUnique(folio)){ alert("Folio duplicado (RF-07)"); closeModal(); return; } const prodId = document.getElementById('productSelect').value; const qty = parseInt(document.getElementById('qty').value); const prod = products.find(p=>p.id===prodId); if(prod.currentStock < qty){ alert("Stock insuficiente"); return; } const newInvoice = { id:"inv"+Date.now(), folio, date:new Date().toISOString().slice(0,10), dueDate:new Date(Date.now()+30*86400000).toISOString().slice(0,10), clientId:"c1", total: prod.priceClient * qty, status:"Pendiente", balance: prod.priceClient * qty, items:[{productId:prod.id, quantity:qty, price:prod.priceClient}] }; salesInvoices.push(newInvoice); updateInventoryFromSale(newInvoice); updateView(); closeModal(); alert("Venta registrada, inventario descontado automáticamente"); };
        window.simulatePurchaseOrder = () => { const demoPo = { id:"PO"+Date.now(), supplierId:"s1", items:[{productId:"p2", quantity:15}]}; const prod = products.find(p=>p.id==="p2"); if(prod){ prod.currentStock += 15; inventoryMovements.unshift({id:Date.now(), date:new Date().toISOString().slice(0,10), type:"ENTRADA", productId:"p2", quantity:15, reference:"Orden de compra simulada", user:"admin"}); alert("Inventario actualizado +15 unidades de INH-205"); updateView();} };
        window.exportReportCSV = () => { alert("Simulación de exportación Excel (RNF-02): Copia de tabla lista"); };
        function attachGlobalFunctionality() { /* reinicializar listeners de botones */ }
        function showModal(content){ const modalDiv = document.getElementById('modal-content'); modalDiv.innerHTML = content; document.getElementById('global-modal').classList.remove('hidden'); window.closeModal = ()=>document.getElementById('global-modal').classList.add('hidden'); }
        window.closeModal = ()=>document.getElementById('global-modal').classList.add('hidden');
        
        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => { btn.addEventListener('click', (e) => { activeTab = btn.getAttribute('data-tab'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active-tab','border-indigo-600','text-indigo-600')); btn.classList.add('active-tab','border-indigo-600','text-indigo-600'); updateView(); }); });
        updateView();
    </script>
